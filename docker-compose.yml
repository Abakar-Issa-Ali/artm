services:
  postgres:
    image: postgres:16
    container_name: artm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: artm_user
      POSTGRES_PASSWORD: artm_password
      POSTGRES_DB: artm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: artm_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: artm_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - mongo
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://artm_user:artm_password@postgres:5432/artm_db
      MONGO_URL: mongodb://mongo:27017/artm
      JWT_SECRET: change_me_en_production
      JWT_EXPIRES_IN: 1d
    ports:
      - "4000:4000"

volumes:
  postgres_data:
  mongo_data: